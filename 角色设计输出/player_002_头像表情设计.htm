<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>头像表情设计 - 魔法主角</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 16px; }
        .container { height: 100%; }

        /* 图片占位符样式 */
        .placeholder {
            background: #2a2a4a;
            border: 2px dashed #4ecdc4;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4ecdc4;
            font-size: 14px;
        }

        /* 左右布局 - 填满屏幕 */
        .layout {
            display: flex;
            gap: 16px;
            height: calc(100vh - 32px);
        }
        .left {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 基础头像 */
        .avatar-main { width: 300px; aspect-ratio: 1; border-radius: 50%; }

        /* 面部特征网格 */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 300px;
        }
        .feature-box { aspect-ratio: 1; }

        /* 表情网格 - 各占一半高度 */
        .expression-grid { flex: 1; gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); }
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); }
        .expression-box { aspect-ratio: 1; border-radius: 50%; }
    </style>
</head>
<body>
<div class="container">

    <!--
    ============================================
    角色信息
    ----------------------------------------
    角色ID：player_002
    角色名称：魔法主角
    用途：对话系统 / UI界面 / 状态显示
    ============================================
    -->

    <!--
    ============================================
    规格要求
    ----------------------------------------
    头像尺寸：128×128px（主要）/ 256×256px（高清）
    输出格式：PNG（透明背景）
    表情数量：5种基础表情（需求文档要求）
              + 7种扩展表情（建议补充）
    ============================================
    -->

    <!--
    ============================================
    构图要点
    ----------------------------------------
    裁剪范围：胸上裁剪，露出部分肩部和项链
    面部位置：居中偏上，留出头部空间
    朝向：略微侧向右侧（3/4侧面）
    发丝：部分发丝飘出框外，增加动感
    ============================================
    -->

    <!--
    ============================================
    面部特征基准
    ----------------------------------------
    脸型：鹅蛋脸，下巴略尖
    眼睛：
      - 形状：杏眼，略微上挑
      - 瞳色：异色瞳 - 左眼淡紫色 #DDA0DD，右眼浅金色 #FFD700
      - 大小：中等偏大
      - 睫毛：长而浓密，自然弯曲
    眉毛：
      - 形状：柳叶眉，略细
      - 粗细：中等偏细
      - 颜色：淡灰色 #A9A9A9
    鼻子：小巧精致，鼻梁挺直
    嘴巴：
      - 大小：中等偏小
      - 唇色：淡粉色 #FFB6C1
      - 形状：唇峰明显
    ============================================
    -->

    <!--
    ============================================
    配色参考
    ----------------------------------------
    肤色-基底：珍珠白 #FFF5EE
    肤色-阴影：淡粉灰 #E8D8D0
    腮红：淡粉红 #FFC0CB（位置：颧骨处）
    发色-基底：银白 #E8E8FF
    发色-渐变：淡紫 #DDA0DD
    发色-高光：浅蓝 #B0E0E6
    瞳色-左：淡紫 #DDA0DD
    瞳色-右：浅金 #FFD700
    唇色：淡粉 #FFB6C1
    魔法纹路：彩虹色渐变
    ============================================
    -->

    <!--
    ============================================
    表情变化分解表
    ----------------------------------------
    | 表情 | 眉毛 | 眼睛 | 嘴巴 | 特效 |
    |------|------|------|------|------|
    | 默认 | 自然 | 平视 | 微笑 | 无 |
    | 高兴 | 微扬 | 眯起 | 开心笑 | 无 |
    | 愤怒 | 皱紧 | 怒视 | 抿嘴 | 眼中闪光 |
    | 悲伤 | 下垂 | 泛泪 | 嘴角下垂 | 可能有泪 |
    | 受伤 | 皱眉 | 痛苦 | 咬唇 | 汗滴/血迹 |
    | 惊讶 | 上扬 | 睁大 | 微张 | 无 |
    | 施法 | 专注 | 发光 | 严肃 | 眼中光芒 |
    | 冥想 | 舒缓 | 闭眼 | 平静 | 淡光晕 |
    ============================================
    -->

    <!--
    ============================================
    PSD图层结构
    ----------------------------------------
    效果层（腮红/汗水/泪滴/魔法光效）
    → 嘴巴（不同表情）
    → 眼睛（不同表情+异色瞳）
    → 眉毛（不同表情）
    → 魔法纹路（面部纹饰）
    → 刘海
    → 基础脸
    → 头发（后层）
    → 背景
    ============================================
    -->

    <!--
    ============================================
    图片区域
    ============================================
    -->
    <div class="layout">
        <!-- 左侧：基础头像 + 面部特征 -->
        <div class="left">
            <div class="placeholder avatar-main">基础头像 256×256px</div>
            <div class="feature-grid">
                <div class="placeholder feature-box">眼睛特写 80×80px</div>
                <div class="placeholder feature-box">眉毛特写 80×80px</div>
                <div class="placeholder feature-box">嘴巴特写 80×80px</div>
            </div>
        </div>
        <!-- 右侧：表情网格 -->
        <div class="right">
            <!-- 基础表情（需求文档要求的5种） -->
            <div class="expression-grid grid-4">
                <div class="placeholder expression-box">默认 128×128px</div>
                <div class="placeholder expression-box">高兴 128×128px</div>
                <div class="placeholder expression-box">愤怒 128×128px</div>
                <div class="placeholder expression-box">悲伤 128×128px</div>
            </div>
            <!-- 必需表情 -->
            <div class="expression-grid grid-6">
                <div class="placeholder expression-box">受伤</div>
                <div class="placeholder expression-box">施法</div>
                <div class="placeholder expression-box">冥想</div>
                <div class="placeholder expression-box">惊讶</div>
                <div class="placeholder expression-box">思考</div>
                <div class="placeholder expression-box">得意</div>
            </div>
            <!-- 扩展表情 -->
            <div class="expression-grid grid-6">
                <div class="placeholder expression-box">担心</div>
                <div class="placeholder expression-box">害羞</div>
                <div class="placeholder expression-box">无语</div>
                <div class="placeholder expression-box">战斗</div>
                <div class="placeholder expression-box">哭泣</div>
                <div class="placeholder expression-box">严肃</div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
