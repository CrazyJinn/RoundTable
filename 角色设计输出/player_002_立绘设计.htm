<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>立绘设计 - 魔法主角</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 16px; }
        .container { height: 100%; }

        /* 图片占位符样式 */
        .placeholder {
            background: #2a2a4a;
            border: 2px dashed #4ecdc4;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4ecdc4;
            font-size: 14px;
        }

        /* 左右布局 - 填满屏幕 */
        .layout {
            display: flex;
            gap: 16px;
            height: calc(100vh - 32px);
        }
        .left { flex-shrink: 0; }
        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 全身立绘 - 填满高度 */
        .full-body { height: 100%; aspect-ratio: 1/2; }

        /* 网格布局 - 各占一半高度 */
        .grid-4, .grid-6 { flex: 1; gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); }
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); }

        /* 正方形 */
        .detail-box, .expression-box { aspect-ratio: 1; }
    </style>
</head>
<body>
<div class="container">

    <!--
    ============================================
    角色档案
    ----------------------------------------
    角色ID：player_002
    角色名称：魔法主角
    角色定位：主角
    势力阵营：魔法派·秘术协会
    设计主题：彩虹色
    作战风格：远程魔法攻击
    ============================================
    -->

    <!--
    ============================================
    规格要求
    ----------------------------------------
    输出尺寸：1920×1080 像素
    分辨率：72 DPI（屏幕显示）
    文件格式：PNG（透明背景）/ PSD（分层）
    输出数量：3张（默认/施法/受伤）
    ============================================
    -->

    <!--
    ============================================
    设计关键词
    ----------------------------------------
    神秘优雅 / 彩虹魔法 / 远古智慧 / 秘术师
    梦幻飘逸 / 百年孤独 / 柔中带刚
    ============================================
    -->

    <!--
    ============================================
    角色设定描述
    ----------------------------------------
    背景故事：
    魔法派因身体变异可活至300岁，现年120岁的她外表看似年轻女子。
    14年前执行任务时意外杀死了男主的双亲，这个秘密一直压在她心头。
    作为秘术协会的精英法师，她精通各种杀伤性魔法。

    性格特点：
    外表冷静优雅，内心背负着沉重的愧疚。处事果断但并非无情，
    对生命的逝去有着深刻的理解。战斗时专注而从容。

    游戏定位：
    远程魔法输出角色，擅长范围伤害和控制技能。
    需要通过冥想恢复魔法值，战术性较强。
    ============================================
    -->

    <!--
    ============================================
    外貌特征
    ----------------------------------------
    年龄外观：约20岁外表（实际120岁）
    体型：纤细苗条，身高约165cm
    发型发色：及腰长发，渐变色（银白渐变至淡紫，
              发梢带有微弱的彩虹光泽）
    瞳色：异色瞳 - 左眼淡紫色，右眼浅金色
    肤色：白皙，带有轻微的珍珠般光泽（魔法变异特征）
    显著特征：
    - 面部有淡彩色的魔法纹路（战斗时会更明显）
    - 双手手指有细小的符文印记
    - 耳朵微尖（变异特征）
    ============================================
    -->

    <!--
    ============================================
    服装设计
    ----------------------------------------
    头部：
    - 无冠头饰：细银链环绕额头，镶嵌小型彩虹色宝石
    - 发饰：几缕头发编织着细小的魔法晶体

    上衣：
    - 内层：紧身白色丝绸衬衣，高领设计
    - 外层：宽松的秘术师长袍（开放式），彩虹色渐变织锦
    - 袖口：宽大的喇叭袖，边缘有金色刺绣
    - 肩部：半透明的虹彩披肩，飘浮感

    下装：
    - 长裙：多层薄纱裙，从白色渐变至淡紫再至浅蓝
    - 裙摆：有星尘般的闪烁效果，飘逸感
    - 腰间：银色编织腰带，挂有几个小型魔法药剂瓶

    鞋靴：
    - 低跟长靴：深紫色皮质，有银色符文装饰
    - 靴筒：及小腿中部

    配饰：
    - 魔法典籍：悬浮在身侧的小型法典（施法时使用）
    - 能量水晶项链：中央有彩虹色宝石
    - 手镯：双手腕各有一个细银环，刻有秘术符文
    ============================================
    -->

    <!--
    ============================================
    配色方案
    ----------------------------------------
    主色：彩虹渐变（白→淡紫→浅蓝→粉→浅绿）
    强调色：金色 #FFD700（符文、装饰）
    点缀色：银色 #C0C0C0（配饰）
    阴影色：深紫 #2D1B4E（阴影层次）
    肤色：珍珠白 #FFF5EE
    发色：银白渐变淡紫 #E8E8FF → #DDA0DD
    ============================================
    -->

    <!--
    ============================================
    构图要点
    ----------------------------------------
    姿势：优雅站立，微微侧身，一手抬起准备施法
    重心：右腿为主，左腿略微放松
    视线方向：略向下看（俯视感，体现威严）
    手部动作：右手抬起，指尖有微弱的魔法光辉
           左手自然垂下，手持魔法典籍
    服装飘动：披肩和裙摆向右侧飘动（魔法能量流动感）
    魔法效果：周围环绕淡淡的彩虹色光粒子
    ============================================
    -->

    <!--
    ============================================
    表情变体说明
    ----------------------------------------
    1. 默认：冷静淡然，眼神深邃
    2. 施法：专注认真，眼中闪现光芒
    3. 受伤：痛苦但坚韧，眉头微皱
    ============================================
    -->

    <!--
    ============================================
    图层规划（PSD分层结构）
    ----------------------------------------
    前景效果层：魔法粒子、光效
    → 身体前部层：右手、部分裙摆
    → 躯干层：身体主体、服装
    → 头发层：长发（单独分层便于动画）
    → 身体后部层：左手、部分披肩
    → 背景层：基础背景色
    ============================================
    -->

    <!--
    ============================================
    图片区域
    ============================================
    -->
    <div class="layout">
        <!-- 左侧：全身立绘 -->
        <div class="left">
            <div class="placeholder full-body">全身立绘 540×1080px</div>
        </div>
        <!-- 右侧：局部详图 + 表情 -->
        <div class="right">
            <!-- 局部设计详图 -->
            <div class="grid-4">
                <div class="placeholder detail-box">头部特写 270×270px</div>
                <div class="placeholder detail-box">上半身 270×270px</div>
                <div class="placeholder detail-box">手部与魔法 270×270px</div>
                <div class="placeholder detail-box">下半身 270×270px</div>
            </div>
            <!-- 基础表情 -->
            <div class="grid-6">
                <div class="placeholder expression-box">默认 180×180px</div>
                <div class="placeholder expression-box">施法 180×180px</div>
                <div class="placeholder expression-box">受伤 180×180px</div>
                <div class="placeholder expression-box">高兴 180×180px</div>
                <div class="placeholder expression-box">悲伤 180×180px</div>
                <div class="placeholder expression-box">战斗 180×180px</div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
