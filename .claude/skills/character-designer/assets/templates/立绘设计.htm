<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>立绘设计 - [角色名称]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 16px; }
        .container { height: 100%; }

        /* 图片占位符样式 */
        .placeholder {
            background: #2a2a4a;
            border: 2px dashed #4ecdc4;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4ecdc4;
            font-size: 14px;
        }

        /* 左右布局 - 填满屏幕 */
        .layout {
            display: flex;
            gap: 16px;
            height: calc(100vh - 32px);
        }
        .left { flex-shrink: 0; }
        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 全身立绘 - 填满高度 */
        .full-body { height: 100%; aspect-ratio: 1/2; }

        /* 网格布局 - 各占一半高度 */
        .grid-4, .grid-6 { flex: 1; gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); }
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); }

        /* 正方形 */
        .detail-box, .expression-box { aspect-ratio: 1; }
    </style>
</head>
<body>
<div class="container">

    <!--
    ============================================
    角色档案
    ----------------------------------------
    角色ID：
    角色名称：
    角色定位：主角 / NPC / 敌人 / BOSS
    势力阵营：科技派 / 魔法派 / 中立
    ============================================
    -->

    <!--
    ============================================
    规格要求
    ----------------------------------------
    输出尺寸：像素
    分辨率：DPI
    文件格式：PNG / PSD
    ============================================
    -->

    <!--
    ============================================
    设计关键词
    ----------------------------------------
    4-6个描述角色视觉风格的关键词
    ============================================
    -->

    <!--
    ============================================
    角色设定描述
    ----------------------------------------
    背景故事：
    性格特点：
    游戏定位：
    ============================================
    -->

    <!--
    ============================================
    外貌特征
    ----------------------------------------
    年龄外观：
    体型：
    发型发色：
    瞳色：
    肤色：
    显著特征：
    ============================================
    -->

    <!--
    ============================================
    服装设计
    ----------------------------------------
    头部：
    上衣：
    下装：
    鞋靴：
    配饰：
    ============================================
    -->

    <!--
    ============================================
    配色方案
    ----------------------------------------
    主色：
    强调色：
    点缀色：
    阴影色：
    肤色：
    发色：
    ============================================
    -->

    <!--
    ============================================
    构图要点
    ----------------------------------------
    姿势：
    重心：
    视线方向：
    手部动作：
    服装飘动：
    ============================================
    -->

    <!--
    ============================================
    图层规划
    ----------------------------------------
    前景效果层 → 身体前部层 → 躯干层 → 身体后部层 → 背景层
    ============================================
    -->

    <!--
    ============================================
    图片区域
    ============================================
    -->
    <div class="layout">
        <!-- 左侧：全身立绘 -->
        <div class="left">
            <div class="placeholder full-body">全身立绘 400×800px</div>
        </div>
        <!-- 右侧：局部详图 + 表情 -->
        <div class="right">
            <!-- 局部设计详图 -->
            <div class="grid-4">
                <div class="placeholder detail-box">头部特写 200×200px</div>
                <div class="placeholder detail-box">上半身 200×200px</div>
                <div class="placeholder detail-box">手部与武器 200×200px</div>
                <div class="placeholder detail-box">下半身 200×200px</div>
            </div>
            <!-- 基础表情 -->
            <div class="grid-6">
                <div class="placeholder expression-box">默认 150×150px</div>
                <div class="placeholder expression-box">高兴 150×150px</div>
                <div class="placeholder expression-box">生气 150×150px</div>
                <div class="placeholder expression-box">悲伤 150×150px</div>
                <div class="placeholder expression-box">惊讶 150×150px</div>
                <div class="placeholder expression-box">战斗 150×150px</div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
