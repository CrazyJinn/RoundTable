<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>头像表情设计 - [角色名称]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 16px; }
        .container { height: 100%; }

        /* 图片占位符样式 */
        .placeholder {
            background: #2a2a4a;
            border: 2px dashed #4ecdc4;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4ecdc4;
            font-size: 14px;
        }

        /* 左右布局 - 填满屏幕 */
        .layout {
            display: flex;
            gap: 16px;
            height: calc(100vh - 32px);
        }
        .left {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 基础头像 */
        .avatar-main { width: 300px; aspect-ratio: 1; border-radius: 50%; }

        /* 面部特征网格 */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 300px;
        }
        .feature-box { aspect-ratio: 1; }

        /* 表情网格 - 各占一半高度 */
        .expression-grid { flex: 1; gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); }
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); }
        .expression-box { aspect-ratio: 1; border-radius: 50%; }
    </style>
</head>
<body>
<div class="container">

    <!--
    ============================================
    角色信息
    ----------------------------------------
    角色ID：
    角色名称：
    用途：对话系统 / UI界面
    ============================================
    -->

    <!--
    ============================================
    规格要求
    ----------------------------------------
    头像尺寸：128×128px / 256×256px
    输出格式：PNG（透明背景）
    表情数量：12种
    ============================================
    -->

    <!--
    ============================================
    构图要点
    ----------------------------------------
    裁剪范围：肩上 / 胸上
    面部位置：
    朝向：
    ============================================
    -->

    <!--
    ============================================
    面部特征基准
    ----------------------------------------
    眼睛：形状、瞳色、大小
    眉毛：形状、粗细、颜色
    嘴巴：大小、唇色
    ============================================
    -->

    <!--
    ============================================
    配色参考
    ----------------------------------------
    肤色-基底：
    肤色-阴影：
    腮红：
    发色：
    瞳色：
    唇色：
    ============================================
    -->

    <!--
    ============================================
    PSD图层结构
    ----------------------------------------
    效果层（腮红/汗水/泪滴）→ 嘴巴 → 眼睛 → 眉毛 → 基础脸
    ============================================
    -->

    <!--
    ============================================
    图片区域
    ============================================
    -->
    <div class="layout">
        <!-- 左侧：基础头像 + 面部特征 -->
        <div class="left">
            <div class="placeholder avatar-main">基础头像 256×256px</div>
            <div class="feature-grid">
                <div class="placeholder feature-box">眼睛 80×80px</div>
                <div class="placeholder feature-box">眉毛 80×80px</div>
                <div class="placeholder feature-box">嘴巴 80×80px</div>
            </div>
        </div>
        <!-- 右侧：表情网格 -->
        <div class="right">
            <!-- 基础表情 -->
            <div class="expression-grid grid-4">
                <div class="placeholder expression-box">默认 128×128px</div>
                <div class="placeholder expression-box">高兴 128×128px</div>
                <div class="placeholder expression-box">生气 128×128px</div>
                <div class="placeholder expression-box">悲伤 128×128px</div>
            </div>
            <!-- 扩展表情 -->
            <div class="expression-grid grid-6">
                <div class="placeholder expression-box">惊讶</div>
                <div class="placeholder expression-box">思考</div>
                <div class="placeholder expression-box">得意</div>
                <div class="placeholder expression-box">担心</div>
                <div class="placeholder expression-box">害羞</div>
                <div class="placeholder expression-box">无语</div>
            </div>
            <!-- 特殊表情 -->
            <div class="expression-grid grid-6">
                <div class="placeholder expression-box">战斗</div>
                <div class="placeholder expression-box">受伤</div>
                <div class="placeholder expression-box">震惊</div>
                <div class="placeholder expression-box">哭泣</div>
                <div class="placeholder expression-box">大笑</div>
                <div class="placeholder expression-box">鄙视</div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
