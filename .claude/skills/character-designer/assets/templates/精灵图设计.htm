<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>精灵图设计 - [角色名称]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 16px; }
        .container { height: 100%; }

        /* 图片占位符样式 */
        .placeholder {
            background: #2a2a4a;
            border: 2px dashed #4ecdc4;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4ecdc4;
            font-size: 12px;
        }

        /* 左右布局 - 填满屏幕 */
        .layout {
            display: flex;
            gap: 16px;
            height: calc(100vh - 32px);
        }
        .left { flex-shrink: 0; width: 320px; display: flex; flex-direction: column; gap: 8px; }
        .right { flex: 1; display: flex; flex-direction: column; gap: 8px; }

        /* 动画网格 */
        .anim-row { flex: 1; display: grid; gap: 6px; }
        .grid-5 { grid-template-columns: repeat(5, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }

        /* 精灵帧 */
        .sprite-box { aspect-ratio: 1; }

        /* 帧序列 */
        .frame-row { display: flex; gap: 4px; }
        .frame-box { width: 48px; height: 48px; flex-shrink: 0; }
    </style>
</head>
<body>
<div class="container">

    <!--
    ============================================
    角色信息
    ----------------------------------------
    角色ID：
    角色类型：玩家 / 敌人 / NPC
    ============================================
    -->

    <!--
    ============================================
    精灵规格
    ----------------------------------------
    帧尺寸：64×64px / 128×128px
    输出格式：PNG（透明背景）
    方向数：4方向 / 8方向
    ============================================
    -->

    <!--
    ============================================
    动画规格
    ----------------------------------------
    | 动画 | 帧数 | FPS | 循环 | 方向数 |
    | idle | 4 | 8 | 是 | 4 |
    | walk | 4 | 10 | 是 | 4 |
    | run | 4 | 12 | 是 | 4 |
    | attack | 6 | 12 | 否 | 4 |
    | hurt | 2 | 8 | 否 | 1 |
    | death | 6 | 8 | 否 | 1 |
    ============================================
    -->

    <!--
    ============================================
    锚点设置
    ----------------------------------------
    锚点位置：底部中心 (32, 64)
    ============================================
    -->

    <!--
    ============================================
    碰撞框
    ----------------------------------------
    主体碰撞框：32×48px，偏移 (0, -24)
    攻击范围：48×32px，偏移 (16, 0)
    ============================================
    -->

    <!--
    ============================================
    图片区域
    ============================================
    -->
    <div class="layout">
        <!-- 左侧：帧序列预览 -->
        <div class="left">
            <!--
            ============================================
            待机动画帧序列
            ============================================
            -->
            <div class="frame-row">
                <div class="placeholder frame-box">1</div>
                <div class="placeholder frame-box">2</div>
                <div class="placeholder frame-box">3</div>
                <div class="placeholder frame-box">4</div>
            </div>
            <!--
            ============================================
            行走动画帧序列
            ============================================
            -->
            <div class="frame-row">
                <div class="placeholder frame-box">1</div>
                <div class="placeholder frame-box">2</div>
                <div class="placeholder frame-box">3</div>
                <div class="placeholder frame-box">4</div>
            </div>
            <!--
            ============================================
            攻击动画帧序列
            ============================================
            -->
            <div class="frame-row">
                <div class="placeholder frame-box">1</div>
                <div class="placeholder frame-box">2</div>
                <div class="placeholder frame-box">3</div>
                <div class="placeholder frame-box">4</div>
                <div class="placeholder frame-box">5</div>
                <div class="placeholder frame-box">6</div>
            </div>
            <!--
            ============================================
            受伤动画帧序列
            ============================================
            -->
            <div class="frame-row">
                <div class="placeholder frame-box">1</div>
                <div class="placeholder frame-box">2</div>
            </div>
            <!--
            ============================================
            死亡动画帧序列
            ============================================
            -->
            <div class="frame-row">
                <div class="placeholder frame-box">1</div>
                <div class="placeholder frame-box">2</div>
                <div class="placeholder frame-box">3</div>
                <div class="placeholder frame-box">4</div>
                <div class="placeholder frame-box">5</div>
                <div class="placeholder frame-box">6</div>
            </div>
        </div>
        <!-- 右侧：动画网格 -->
        <div class="right">
            <!-- 必需动画 -->
            <div class="anim-row grid-5">
                <div class="placeholder sprite-box">idle-待机 64×64px</div>
                <div class="placeholder sprite-box">walk-行走 64×64px</div>
                <div class="placeholder sprite-box">run-奔跑 64×64px</div>
                <div class="placeholder sprite-box">hurt-受伤 64×64px</div>
                <div class="placeholder sprite-box">death-死亡 64×64px</div>
            </div>
            <!-- 战斗动画 -->
            <div class="anim-row grid-4">
                <div class="placeholder sprite-box">attack1-普攻 64×64px</div>
                <div class="placeholder sprite-box">attack2-重击 64×64px</div>
                <div class="placeholder sprite-box">skill-技能 64×64px</div>
                <div class="placeholder sprite-box">dodge-闪避 64×64px</div>
            </div>
            <!-- 交互动画 -->
            <div class="anim-row grid-3">
                <div class="placeholder sprite-box">interact-交互 64×64px</div>
                <div class="placeholder sprite-box">pickup-拾取 64×64px</div>
                <div class="placeholder sprite-box">talk-对话 64×64px</div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
