<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>界面设计 - [界面名称]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #ff6b6b; border-bottom: 2px solid #ff6b6b; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #4ecdc4; margin: 20px 0 15px; padding-left: 10px; border-left: 3px solid #4ecdc4; }

        .section { background: #16213e; border-radius: 8px; padding: 20px; margin: 15px 0; }

        .layout-preview { background: #2a2a4a; border: 2px dashed #4ecdc4; border-radius: 8px; height: 400px; position: relative; }
        .layout-zone { position: absolute; background: rgba(78, 205, 196, 0.1); border: 1px dashed #4ecdc4; border-radius: 5px; }

        .element-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; }
        .element-card { background: #2a2a4a; border-radius: 8px; padding: 15px; border: 2px solid transparent; min-height: 80px; }
        .element-card:hover { border-color: #4ecdc4; }

        .bar-demo { height: 20px; background: #1a1a2e; border-radius: 10px; overflow: hidden; margin: 5px 0; }
        .bar-fill { height: 100%; border-radius: 10px; }

        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { padding: 12px; text-align: left; border: 1px solid #0f3460; }
        th { background: #0f3460; color: #4ecdc4; }
        td { background: #1a1a2e; }

        .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .color-swatch { width: 40px; height: 40px; border-radius: 6px; border: 2px solid transparent; }
        .color-swatch:hover { border-color: #fff; }

        .state-flow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
        .state-node { background: #2a2a4a; border: 2px solid #4ecdc4; border-radius: 6px; padding: 10px 15px; }
        .state-arrow { color: #4ecdc4; font-size: 18px; }
    </style>
</head>
<body>
<div class="container">

    <h1>界面设计 - [界面名称]</h1>

    <!--
    ============================================
    界面档案与规格
    ----------------------------------------
    界面档案：界面ID、界面名称、界面类型（HUD/菜单/对话框）、触发条件
    规格要求：设计尺寸（如1920x1080）、适配策略（拉伸/居中/安全区）、输出格式（PNG/PSD）
    ============================================
    -->
    <div class="section" name="界面档案与规格"></div>

    <!--
    ============================================
    界面布局
    ----------------------------------------
    布局预览：显示各区域的占位框
    - 顶部状态栏：HP/MP/技能CD等
    - 左侧面板：功能按钮或信息
    - 右侧面板：小地图或任务列表
    - 底部操作栏：技能栏、对话框
    - 中央区域：主游戏画面
    区域说明表：区域名称、位置、尺寸、功能、锚点设置
    ============================================
    -->
    <h2>界面布局</h2>
    <div class="section">
        <div class="layout-preview" name="整体布局">
            <div class="layout-zone" name="顶部状态栏" style="top: 0; left: 0; right: 0; height: 60px;"></div>
            <div class="layout-zone" name="左侧面板" style="top: 80px; left: 0; width: 180px; height: 250px;"></div>
            <div class="layout-zone" name="右侧面板" style="top: 80px; right: 0; width: 180px; height: 250px;"></div>
            <div class="layout-zone" name="底部操作栏" style="bottom: 0; left: 0; right: 0; height: 80px;"></div>
            <div class="layout-zone" name="中央区域" style="top: 80px; left: 200px; right: 200px; bottom: 100px; border-style: dotted;"></div>
        </div>
    </div>

    <div class="section" name="区域说明">
        <table>
            <tr><th>区域</th><th>位置</th><th>尺寸</th><th>功能</th><th>锚点</th></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    UI元素
    ----------------------------------------
    按钮元素（4个）：主要按钮、次要按钮、图标按钮、禁用按钮
    进度条元素（3个）：HP条（红色）、MP条（青色）、经验条（黄色）
    技能槽元素（3个）：可用状态、冷却状态、禁用状态
    图标元素（4个）：物品图标、技能图标、状态图标、货币图标
    ============================================
    -->
    <h2>UI元素</h2>
    <div class="section" name="按钮元素">
        <div class="element-grid">
            <div class="element-card" name="主要按钮"></div>
            <div class="element-card" name="次要按钮"></div>
            <div class="element-card" name="图标按钮"></div>
            <div class="element-card" name="禁用按钮"></div>
        </div>
    </div>

    <div class="section" name="进度条元素">
        <div class="element-grid">
            <div class="element-card" name="HP条">
                <div class="bar-demo">
                    <div class="bar-fill" style="width: 70%; background: linear-gradient(90deg, #ff6b6b, #ff8e8e);"></div>
                </div>
            </div>
            <div class="element-card" name="MP条">
                <div class="bar-demo">
                    <div class="bar-fill" style="width: 50%; background: linear-gradient(90deg, #4ecdc4, #6ee7df);"></div>
                </div>
            </div>
            <div class="element-card" name="经验条">
                <div class="bar-demo">
                    <div class="bar-fill" style="width: 30%; background: linear-gradient(90deg, #ffe66d, #fff59d);"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="section" name="技能槽元素">
        <div class="element-grid">
            <div class="element-card" name="技能槽-可用"></div>
            <div class="element-card" name="技能槽-冷却"></div>
            <div class="element-card" name="技能槽-禁用"></div>
        </div>
    </div>

    <div class="section" name="图标元素">
        <div class="element-grid">
            <div class="element-card" name="物品图标"></div>
            <div class="element-card" name="技能图标"></div>
            <div class="element-card" name="状态图标"></div>
            <div class="element-card" name="货币图标"></div>
        </div>
    </div>

    <!--
    ============================================
    配色方案
    ----------------------------------------
    主题配色：面板背景、边框分隔、强调色、警告删除、高亮选中、辅助色
    文字配色：主文字、次文字、链接高亮、错误提示、成功提示
    每个色块用style="background: #颜色代码"设置
    ============================================
    -->
    <h2>配色方案</h2>
    <div class="section" name="主题配色">
        <div class="color-row">
            <div class="color-swatch" name="面板背景" style="background: #16213e;"></div>
            <div class="color-swatch" name="边框分隔" style="background: #0f3460;"></div>
            <div class="color-swatch" name="强调色" style="background: #4ecdc4;"></div>
            <div class="color-swatch" name="警告删除" style="background: #ff6b6b;"></div>
            <div class="color-swatch" name="高亮选中" style="background: #ffe66d;"></div>
            <div class="color-swatch" name="辅助色" style="background: #a29bfe;"></div>
        </div>
    </div>

    <div class="section" name="文字配色">
        <div class="color-row">
            <div class="color-swatch" name="主文字" style="background: #ffffff;"></div>
            <div class="color-swatch" name="次文字" style="background: #888888;"></div>
            <div class="color-swatch" name="链接高亮" style="background: #4ecdc4;"></div>
            <div class="color-swatch" name="错误提示" style="background: #ff6b6b;"></div>
            <div class="color-swatch" name="成功提示" style="background: #2ecc71;"></div>
        </div>
    </div>

    <!--
    ============================================
    交互状态
    ----------------------------------------
    按钮状态流程：Normal → Hover → Pressed → Disabled
    按钮状态表：状态、视觉变化、动画时长、音效文件
    面板动画表：动画名称、触发条件、效果描述、动画时长
    ============================================
    -->
    <h2>交互状态</h2>
    <div class="section" name="按钮状态">
        <div class="state-flow">
            <div class="state-node" name="Normal"></div>
            <span class="state-arrow">→</span>
            <div class="state-node" name="Hover"></div>
            <span class="state-arrow">→</span>
            <div class="state-node" name="Pressed"></div>
            <span class="state-arrow">→</span>
            <div class="state-node" name="Disabled"></div>
        </div>
        <table>
            <tr><th>状态</th><th>视觉变化</th><th>动画</th><th>音效</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <div class="section" name="面板动画">
        <table>
            <tr><th>动画名称</th><th>触发条件</th><th>效果</th><th>时长</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    字体规范
    ----------------------------------------
    字体设置表：用途（标题/副标题/正文/说明文字/数字）、字体名称、字号、字重
    ============================================
    -->
    <h2>字体规范</h2>
    <div class="section" name="字体设置">
        <table>
            <tr><th>用途</th><th>字体</th><th>字号</th><th>字重</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    输出清单表
    ----------------------------------------
    文件列表：背景PNG、按钮精灵图PNG、图标精灵图PNG、分层源文件PSD
    每行包含：文件名、内容说明、格式、优先级
    ============================================
    -->
    <h2>输出清单</h2>
    <div class="section" name="输出文件">
        <table>
            <tr><th>文件名</th><th>内容</th><th>格式</th><th>优先级</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

</div>
</body>
</html>
