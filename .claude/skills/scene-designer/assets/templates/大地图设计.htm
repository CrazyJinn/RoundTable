<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大地图设计 - [地图名称]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #ff6b6b; border-bottom: 2px solid #ff6b6b; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #4ecdc4; margin: 20px 0 15px; padding-left: 10px; border-left: 3px solid #4ecdc4; }

        .section { background: #16213e; border-radius: 8px; padding: 20px; margin: 15px 0; }

        .map-preview { background: #2a2a4a; border: 2px dashed #4ecdc4; border-radius: 8px; min-height: 300px; position: relative; padding: 20px; }
        .map-grid { display: grid; gap: 2px; }
        .map-cell { aspect-ratio: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; }
        .map-cell.spawn { background: rgba(78, 205, 196, 0.3); border-color: #4ecdc4; }
        .map-cell.boss { background: rgba(255, 107, 107, 0.3); border-color: #ff6b6b; }
        .map-cell.treasure { background: rgba(255, 230, 109, 0.3); border-color: #ffe66d; }
        .map-cell.npc { background: rgba(162, 155, 254, 0.3); border-color: #a29bfe; }
        .map-cell.blocked { background: rgba(100, 100, 100, 0.3); }

        .legend { display: flex; flex-wrap: wrap; gap: 15px; margin: 10px 0; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 16px; height: 16px; border-radius: 3px; }

        .zone-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .zone-card { background: #2a2a4a; border-radius: 8px; padding: 15px; border: 2px solid transparent; min-height: 80px; }
        .zone-card:hover { border-color: #4ecdc4; }

        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { padding: 12px; text-align: left; border: 1px solid #0f3460; }
        th { background: #0f3460; color: #4ecdc4; }
        td { background: #1a1a2e; }

        .layer-stack { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
        .layer-item { background: #2a2a4a; border-radius: 6px; padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-left: 3px solid #4ecdc4; }
        .layer-num { background: #4ecdc4; color: #1a1a2e; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }

        .tileset-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 4px; margin: 10px 0; }
        .tile-item { aspect-ratio: 1; background: #2a2a4a; border: 1px solid #0f3460; border-radius: 3px; }
    </style>
</head>
<body>
<div class="container">

    <h1>大地图设计 - [地图名称]</h1>

    <!--
    ============================================
    地图档案与规格
    ----------------------------------------
    地图档案：地图ID、地图名称、地图类型（主世界/副本/城镇）、所属章节
    规格要求：地图尺寸（像素）、瓦片尺寸（如32x32）、瓦片数量（X×Y格）、输出格式（PNG/TMX）
    环境设定：时间（白天/黄昏/夜晚）、天气（晴/雨/雪/雾）、氛围描述
    ============================================
    -->
    <div class="section" name="地图档案与规格"></div>

    <!--
    ============================================
    地图布局
    ----------------------------------------
    网格预览：12×8或更大的地图网格，用颜色标记不同区域类型
    图例说明：出生点（青色）、BOSS区（红色）、宝箱（黄色）、NPC（紫色）、不可通行（灰色）
    区域划分：3-5个区域卡片，每个标注区域名称、类型（安全区/战斗区/BOSS区）
    ============================================
    -->
    <h2>地图布局</h2>
    <div class="section">
        <div class="map-preview" name="地图布局预览">
            <div class="map-grid" style="grid-template-columns: repeat(12, 1fr);" name="地图网格">
                <div class="map-cell spawn"></div><div class="map-cell"></div><div class="map-cell"></div><div class="map-cell"></div>
                <div class="map-cell npc"></div><div class="map-cell"></div><div class="map-cell"></div><div class="map-cell"></div>
                <div class="map-cell treasure"></div><div class="map-cell"></div><div class="map-cell"></div><div class="map-cell boss"></div>
            </div>
        </div>

        <div class="legend" name="图例">
            <div class="legend-item"><div class="legend-color" style="background: #4ecdc4;"></div></div>
            <div class="legend-item"><div class="legend-color" style="background: #ff6b6b;"></div></div>
            <div class="legend-item"><div class="legend-color" style="background: #ffe66d;"></div></div>
            <div class="legend-item"><div class="legend-color" style="background: #a29bfe;"></div></div>
            <div class="legend-item"><div class="legend-color" style="background: #666;"></div></div>
        </div>
    </div>

    <div class="section" name="区域划分">
        <div class="zone-grid">
            <div class="zone-card" name="区域A"></div>
            <div class="zone-card" name="区域B"></div>
            <div class="zone-card" name="区域C"></div>
        </div>
    </div>

    <!--
    ============================================
    瓦片与地形
    ----------------------------------------
    瓦片集预览：地面、墙壁、装饰、过渡等瓦片的缩略图网格
    瓦片集规格表：类型、尺寸、数量、用途
    地形类型表：地形名称、是否可行走、移动速度倍率、特殊效果
    ============================================
    -->
    <h2>瓦片与地形</h2>
    <div class="section" name="瓦片集预览">
        <div class="tileset-preview">
            <div class="tile-item" name="地面1"></div><div class="tile-item" name="地面2"></div><div class="tile-item" name="地面3"></div>
            <div class="tile-item" name="墙壁1"></div><div class="tile-item" name="墙壁2"></div><div class="tile-item" name="墙壁3"></div>
            <div class="tile-item" name="装饰1"></div><div class="tile-item" name="装饰2"></div><div class="tile-item" name="过渡1"></div>
        </div>
    </div>

    <div class="section" name="瓦片集规格">
        <table>
            <tr><th>类型</th><th>尺寸</th><th>数量</th><th>用途</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <div class="section" name="地形类型">
        <table>
            <tr><th>地形</th><th>可行走</th><th>移动速度</th><th>特殊效果</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    图层结构
    ----------------------------------------
    图层堆栈（从上到下）：5-前景效果层、4-前景遮挡层、3-对象层、2-装饰层、1-地面层、0-背景层
    每层标注视差系数（0.1-1.0，越大移动越快）
    ============================================
    -->
    <h2>图层结构</h2>
    <div class="section" name="图层堆栈">
        <div class="layer-stack">
            <div class="layer-item" name="前景效果层"><div class="layer-num">5</div></div>
            <div class="layer-item" name="前景遮挡层"><div class="layer-num">4</div></div>
            <div class="layer-item" name="对象层"><div class="layer-num">3</div></div>
            <div class="layer-item" name="装饰层"><div class="layer-num">2</div></div>
            <div class="layer-item" name="地面层"><div class="layer-num">1</div></div>
            <div class="layer-item" name="背景层"><div class="layer-num">0</div></div>
        </div>
    </div>

    <!--
    ============================================
    关键点位
    ----------------------------------------
    出生与传送点表：ID、类型（出生点/传送门）、坐标、关联目标
    NPC配置表：ID、NPC名称、坐标、功能（任务/商店/对话）
    敌人生成表：ID、敌人类型、坐标范围、数量、刷新时间
    ============================================
    -->
    <h2>关键点位</h2>
    <div class="section" name="出生与传送点">
        <table>
            <tr><th>ID</th><th>类型</th><th>坐标</th><th>关联目标</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <div class="section" name="NPC配置">
        <table>
            <tr><th>ID</th><th>NPC</th><th>坐标</th><th>功能</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <div class="section" name="敌人生成">
        <table>
            <tr><th>ID</th><th>敌人类型</th><th>坐标范围</th><th>数量</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    碰撞与导航
    ----------------------------------------
    碰撞层类型表：类型（完全阻挡/单向通过/触发区域）、说明、颜色标记
    导航说明：寻路算法、避开的区域、路径点设置
    ============================================
    -->
    <h2>碰撞与导航</h2>
    <div class="section" name="碰撞层">
        <table>
            <tr><th>类型</th><th>说明</th><th>颜色标记</th></tr>
            <tr><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    输出清单表
    ----------------------------------------
    文件列表：瓦片集PNG、地图数据TMX、碰撞数据JSON、预览图PNG
    每行包含：文件名、内容说明、格式、优先级
    ============================================
    -->
    <h2>输出清单</h2>
    <div class="section" name="输出文件">
        <table>
            <tr><th>文件名</th><th>内容</th><th>格式</th><th>优先级</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

</div>
</body>
</html>
