<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>场景物品设计 - [场景名称]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #ff6b6b; border-bottom: 2px solid #ff6b6b; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #4ecdc4; margin: 20px 0 15px; padding-left: 10px; border-left: 3px solid #4ecdc4; }

        .section { background: #16213e; border-radius: 8px; padding: 20px; margin: 15px 0; }

        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .item-card { aspect-ratio: 1; background: #2a2a4a; border-radius: 8px; border: 2px solid transparent; }
        .item-card:hover { border-color: #4ecdc4; }
        .item-card.interactive { border-color: #ffe66d; }
        .item-card.decorative { border-color: #a29bfe; }

        .sprite-row { display: flex; gap: 4px; margin: 10px 0; align-items: flex-end; }
        .sprite-frame { width: 40px; height: 40px; background: #2a2a4a; border: 1px solid #0f3460; border-radius: 4px; }
        .sprite-frame:hover { border-color: #4ecdc4; }

        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { padding: 12px; text-align: left; border: 1px solid #0f3460; }
        th { background: #0f3460; color: #4ecdc4; }
        td { background: #1a1a2e; }

        .flow-demo { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 15px 0; padding: 15px; background: #2a2a4a; border-radius: 8px; }
        .flow-step { background: #1a1a2e; border-radius: 6px; padding: 12px 16px; border: 2px solid #4ecdc4; }
        .flow-arrow { color: #4ecdc4; font-size: 18px; }

        .collision-demo { width: 80px; height: 80px; background: #2a2a4a; border-radius: 8px; position: relative; margin: 15px auto; }
        .collision-box { position: absolute; border: 2px solid; }
        .collision-trigger { position: absolute; border: 2px dashed; border-radius: 50%; }

        .size-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin: 10px 0; }
        .size-item { background: #2a2a4a; border-radius: 5px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div class="container">

    <h1>场景物品设计 - [场景名称]</h1>

    <!--
    ============================================
    场景档案与规格
    ----------------------------------------
    场景档案：场景ID、场景名称、物品总数
    规格要求：物品尺寸范围（最小-最大像素）、输出格式（PNG）、命名规范
    ============================================
    -->
    <div class="section" name="场景档案与规格"></div>

    <!--
    ============================================
    物品清单表
    ----------------------------------------
    列：物品ID、名称、类型、尺寸、可交互、动画帧数、优先级
    行：按优先级排列的所有物品
    ============================================
    -->
    <h2>物品清单</h2>
    <div class="section" name="物品总览">
        <table>
            <tr><th>物品ID</th><th>名称</th><th>类型</th><th>尺寸</th><th>可交互</th><th>动画帧</th><th>优先级</th></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    尺寸规格参考
    ----------------------------------------
    5种常见尺寸：小型32x32、中型48x48、大型64x64、宽型96x64、高型64x96
    ============================================
    -->
    <div class="section" name="尺寸规格参考">
        <div class="size-grid">
            <div class="size-item" name="小型-32x32" style="width: 40px; height: 40px;"></div>
            <div class="size-item" name="中型-48x48" style="width: 56px; height: 56px;"></div>
            <div class="size-item" name="大型-64x64" style="width: 72px; height: 72px;"></div>
            <div class="size-item" name="宽型-96x64" style="width: 104px; height: 72px;"></div>
            <div class="size-item" name="高型-64x96" style="width: 72px; height: 104px;"></div>
        </div>
    </div>

    <!--
    ============================================
    装饰物品
    ----------------------------------------
    自然装饰（8个）：树木01/02、草丛01/02、石头01/02、花01/02（紫色边框）
    建筑装饰（6个）：建筑01/02、路牌01、灯柱01、栅栏01、废墟01（紫色边框）
    ============================================
    -->
    <h2>装饰物品</h2>
    <div class="section" name="自然装饰">
        <div class="item-grid">
            <div class="item-card decorative" name="树木01"></div>
            <div class="item-card decorative" name="树木02"></div>
            <div class="item-card decorative" name="草丛01"></div>
            <div class="item-card decorative" name="草丛02"></div>
            <div class="item-card decorative" name="石头01"></div>
            <div class="item-card decorative" name="石头02"></div>
            <div class="item-card decorative" name="花01"></div>
            <div class="item-card decorative" name="花02"></div>
        </div>
    </div>

    <div class="section" name="建筑装饰">
        <div class="item-grid">
            <div class="item-card decorative" name="建筑01"></div>
            <div class="item-card decorative" name="建筑02"></div>
            <div class="item-card decorative" name="路牌01"></div>
            <div class="item-card decorative" name="灯柱01"></div>
            <div class="item-card decorative" name="栅栏01"></div>
            <div class="item-card decorative" name="废墟01"></div>
        </div>
    </div>

    <!--
    ============================================
    可交互物品
    ----------------------------------------
    收集品（6个）：宝箱01/02、收集品01/02、金币堆、材料堆（黄色边框）
    功能物品（6个）：存档点、传送门、商店、工作台、回复点、机关01（黄色边框）
    ============================================
    -->
    <h2>可交互物品</h2>
    <div class="section" name="收集品">
        <div class="item-grid">
            <div class="item-card interactive" name="宝箱01"></div>
            <div class="item-card interactive" name="宝箱02"></div>
            <div class="item-card interactive" name="收集品01"></div>
            <div class="item-card interactive" name="收集品02"></div>
            <div class="item-card interactive" name="金币堆"></div>
            <div class="item-card interactive" name="材料堆"></div>
        </div>
    </div>

    <div class="section" name="功能物品">
        <div class="item-grid">
            <div class="item-card interactive" name="存档点"></div>
            <div class="item-card interactive" name="传送门"></div>
            <div class="item-card interactive" name="商店"></div>
            <div class="item-card interactive" name="工作台"></div>
            <div class="item-card interactive" name="回复点"></div>
            <div class="item-card interactive" name="机关01"></div>
        </div>
    </div>

    <!--
    ============================================
    交互流程
    ----------------------------------------
    5步流程：靠近 → 显示提示 → 按键触发 → 播放动画 → 执行效果
    ============================================
    -->
    <div class="section" name="交互流程">
        <div class="flow-demo">
            <div class="flow-step" name="靠近"></div>
            <span class="flow-arrow">→</span>
            <div class="flow-step" name="显示提示"></div>
            <span class="flow-arrow">→</span>
            <div class="flow-step" name="按键触发"></div>
            <span class="flow-arrow">→</span>
            <div class="flow-step" name="播放动画"></div>
            <span class="flow-arrow">→</span>
            <div class="flow-step" name="执行效果"></div>
        </div>
    </div>

    <!--
    ============================================
    动画物品
    ----------------------------------------
    精灵表示例：宝箱开启动画4帧（关闭→开启中1→开启中2→已开启）
    动画配置表：物品ID、动画名称、帧数、FPS、是否循环、触发条件
    ============================================
    -->
    <h2>动画物品</h2>
    <div class="section" name="精灵表示例">
        <div class="sprite-row" name="宝箱动画帧">
            <div class="sprite-frame" name="关闭"></div>
            <div class="sprite-frame" name="开启中1"></div>
            <div class="sprite-frame" name="开启中2"></div>
            <div class="sprite-frame" name="已开启"></div>
        </div>
    </div>

    <div class="section" name="动画配置">
        <table>
            <tr><th>物品ID</th><th>动画名</th><th>帧数</th><th>FPS</th><th>循环</th><th>触发条件</th></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    碰撞与交互范围
    ----------------------------------------
    碰撞框类型表：类型（大型建筑/树木/小型装饰/交互物品）、碰撞方式、尺寸、说明
    交互范围示意：主体碰撞框（红色实线）+ 交互触发范围（黄色虚线圆形）
    ============================================
    -->
    <h2>碰撞与交互范围</h2>
    <div class="section" name="碰撞框类型">
        <table>
            <tr><th>类型</th><th>碰撞</th><th>尺寸</th><th>说明</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <div class="section" name="交互范围示意">
        <div class="collision-demo" name="碰撞框示意">
            <div class="collision-box" style="left: 50%; top: 50%; transform: translate(-50%, -50%); width: 32px; height: 48px; border-color: #ff6b6b;" name="主体碰撞"></div>
            <div class="collision-trigger" style="left: 50%; top: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; border-color: #ffe66d;" name="交互范围"></div>
        </div>
    </div>

    <!--
    ============================================
    输出清单表
    ----------------------------------------
    文件列表：装饰物品精灵图PNG、交互物品精灵图PNG、动画物品精灵表PNG、物品配置数据JSON、分层源文件PSD
    每行包含：文件名、内容说明、格式、优先级
    ============================================
    -->
    <h2>输出清单</h2>
    <div class="section" name="输出文件">
        <table>
            <tr><th>文件名</th><th>内容</th><th>格式</th><th>优先级</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

</div>
</body>
</html>
