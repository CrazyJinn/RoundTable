<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>场景背景设计 - [场景名称]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #ff6b6b; border-bottom: 2px solid #ff6b6b; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #4ecdc4; margin: 20px 0 15px; padding-left: 10px; border-left: 3px solid #4ecdc4; }

        .section { background: #16213e; border-radius: 8px; padding: 20px; margin: 15px 0; }

        .scene-preview { background: #2a2a4a; border: 2px dashed #4ecdc4; border-radius: 8px; min-height: 300px; margin: 15px 0; position: relative; overflow: hidden; }

        .layer-demo { position: relative; width: 100%; height: 250px; background: #2a2a4a; border-radius: 8px; overflow: hidden; }
        .layer-demo > div { position: absolute; left: 0; right: 0; display: flex; align-items: center; justify-content: center; border-bottom: 1px dashed rgba(255,255,255,0.2); }

        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { padding: 12px; text-align: left; border: 1px solid #0f3460; }
        th { background: #0f3460; color: #4ecdc4; }
        td { background: #1a1a2e; }

        .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .color-swatch { width: 40px; height: 40px; border-radius: 6px; border: 2px solid transparent; }
        .color-swatch:hover { border-color: #fff; }

        .atmosphere-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .atmosphere-card { background: #2a2a4a; border-radius: 8px; padding: 15px; text-align: center; }
        .atmosphere-preview { height: 60px; border-radius: 5px; margin-bottom: 10px; }

        .zone-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin: 15px 0; }
        .zone-box { aspect-ratio: 1; border-radius: 8px; }

        .horizon-demo { position: relative; height: 150px; background: #2a2a4a; border-radius: 8px; }
        .horizon-line { position: absolute; left: 10%; right: 10%; height: 2px; background: #ff6b6b; }
    </style>
</head>
<body>
<div class="container">

    <h1>场景背景设计 - [场景名称]</h1>

    <!--
    ============================================
    场景档案与规格
    ----------------------------------------
    场景档案：场景ID、场景名称、所属地图、场景类型（城镇/野外/地下城）
    规格要求：画布尺寸（像素）、图层数量、输出格式（PNG/PSD）
    环境设定：时间（白天/黄昏/夜晚）、天气（晴/雨/雪/雾）、季节、氛围描述
    ============================================
    -->
    <div class="section" name="场景档案与规格"></div>

    <!--
    ============================================
    场景预览
    ----------------------------------------
    完整场景：最终合成效果的预览区域
    透视设置：视平线位置（红线条）、透视类型（一点透视/两点透视/平行透视）
    ============================================
    -->
    <h2>场景预览</h2>
    <div class="section">
        <div class="scene-preview" name="完整场景"></div>
    </div>

    <div class="section" name="透视设置">
        <div class="horizon-demo" name="视平线示意">
            <div class="horizon-line" style="top: 40%;" name="视平线"></div>
        </div>
        <table>
            <tr><th>项目</th><th>说明</th></tr>
            <tr><td></td><td></td></tr>
            <tr><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    图层分解
    ----------------------------------------
    图层叠加示意（从上到下）：
    - 天空层：天空、云彩、太阳/月亮（视差0.1）
    - 远景层：远山、远建筑剪影（视差0.3）
    - 中景层：中层建筑、树木（视差0.6）
    - 近景层：前景装饰、可交互物体（视差0.9）
    - 地面层：可行走地面（视差1.0）

    图层规格表：图层号、名称、内容描述、视差系数、输出文件名
    ============================================
    -->
    <h2>图层分解</h2>
    <div class="section">
        <div class="layer-demo" name="图层叠加示意">
            <div style="top: 0; height: 50px; background: rgba(78, 205, 196, 0.15);" name="天空层"></div>
            <div style="top: 45px; height: 50px; background: rgba(255, 230, 109, 0.15);" name="远景层"></div>
            <div style="top: 90px; height: 50px; background: rgba(162, 155, 254, 0.15);" name="中景层"></div>
            <div style="top: 135px; height: 50px; background: rgba(255, 107, 107, 0.15);" name="近景层"></div>
            <div style="bottom: 0; height: 50px; background: rgba(46, 204, 113, 0.15);" name="地面层"></div>
        </div>
    </div>

    <div class="section" name="图层规格">
        <table>
            <tr><th>图层</th><th>名称</th><th>内容</th><th>视差系数</th><th>输出文件</th></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    氛围与光影
    ----------------------------------------
    时间变化效果（4种）：白天（蓝色调）、黄昏（橙红色调）、夜晚（深蓝色调）、雨天（灰色调）
    光源设置表：光源类型（环境光/平行光/点光源）、位置/方向、颜色、强度
    天气特效表：天气类型、粒子效果、密度、后处理效果
    ============================================
    -->
    <h2>氛围与光影</h2>
    <div class="section" name="时间变化">
        <div class="atmosphere-grid">
            <div class="atmosphere-card" name="白天">
                <div class="atmosphere-preview" style="background: linear-gradient(to bottom, #87CEEB, #98D8C8);"></div>
            </div>
            <div class="atmosphere-card" name="黄昏">
                <div class="atmosphere-preview" style="background: linear-gradient(to bottom, #FF7F50, #FF6B6B);"></div>
            </div>
            <div class="atmosphere-card" name="夜晚">
                <div class="atmosphere-preview" style="background: linear-gradient(to bottom, #2C3E50, #1a1a2e);"></div>
            </div>
            <div class="atmosphere-card" name="雨天">
                <div class="atmosphere-preview" style="background: linear-gradient(to bottom, #4a5568, #2d3748);"></div>
            </div>
        </div>
    </div>

    <div class="section" name="光源设置">
        <table>
            <tr><th>光源</th><th>类型</th><th>位置/方向</th><th>颜色</th><th>强度</th></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <div class="section" name="天气特效">
        <table>
            <tr><th>天气</th><th>粒子效果</th><th>密度</th><th>后处理</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    配色方案
    ----------------------------------------
    主色调色块：天空主色、远景色、中景色、近景色、地面色、强调色
    每个色块用style="background: #颜色代码"设置
    ============================================
    -->
    <h2>配色方案</h2>
    <div class="section" name="主色调">
        <div class="color-row">
            <div class="color-swatch" name="天空主色" style="background: #2C3E50;"></div>
            <div class="color-swatch" name="远景色" style="background: #34495E;"></div>
            <div class="color-swatch" name="中景色" style="background: #7F8C8D;"></div>
            <div class="color-swatch" name="近景色" style="background: #95A5A6;"></div>
            <div class="color-swatch" name="地面色" style="background: #BDC3C7;"></div>
            <div class="color-swatch" name="强调色" style="background: #ff6b6b;"></div>
        </div>
    </div>

    <!--
    ============================================
    特殊区域
    ----------------------------------------
    交互区域网格：入口A（青色边框）、NPC位置（黄色边框）、宝箱点（红色边框）、存档点（紫色边框）
    交互区域规格表：区域ID、类型、坐标范围、视觉提示
    ============================================
    -->
    <h2>特殊区域</h2>
    <div class="section" name="交互区域">
        <div class="zone-grid">
            <div class="zone-box" name="入口A" style="border: 2px dashed #4ecdc4;"></div>
            <div class="zone-box" name="NPC位置" style="border: 2px dashed #ffe66d;"></div>
            <div class="zone-box" name="宝箱点" style="border: 2px dashed #ff6b6b;"></div>
            <div class="zone-box" name="存档点" style="border: 2px dashed #a29bfe;"></div>
        </div>
    </div>

    <div class="section" name="交互区域规格">
        <table>
            <tr><th>区域ID</th><th>类型</th><th>坐标范围</th><th>视觉提示</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

    <!--
    ============================================
    输出清单表
    ----------------------------------------
    文件列表：完整场景PNG、各图层PNG（天空/远景/中景/近景/地面）、分层源文件PSD
    每行包含：文件名、内容说明、格式、优先级
    ============================================
    -->
    <h2>输出清单</h2>
    <div class="section" name="输出文件">
        <table>
            <tr><th>文件名</th><th>内容</th><th>格式</th><th>优先级</th></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td></tr>
        </table>
    </div>

</div>
</body>
</html>
